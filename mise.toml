[tools]
node = "latest"
rust = "latest"

[settings]
env_shell_expand = true

[env]
RUSTUP_HOME="$HOME/.rustup"
CARGO_HOME="$HOME/.cargo"

[tasks.build-wasm]
description = "Rust を WASM にコンパイルして src/pkg/ に出力"
run = "npm run build:wasm"

[tasks.build-cli]
description = "CLI バイナリをビルド"
run = "npm run build:cli"

[tasks.test-rust]
description = "Rust テストを実行"
run = "cargo test"

[tasks.compile]
description = "フルビルド（WASM + type-check + lint + esbuild）"
run = "npm run compile"

[tasks.package]
description = "プロダクションビルド（WASM + type-check + lint + minified esbuild）"
run = "npm run package"

[tasks.check]
description = "TypeScript type-check + lint"
run = "npm run check-types && npm run lint"

[tasks.download]
run = [
    "echo Downloading files...",
    "gh release download --repo firstforest/daily-task-logger --pattern *.vsix",
]

[tasks.install]
run = "node scripts/install-vsix.js"

[tasks.release]
run = ["npm version patch", "git push origin main", "git push --tags"]
